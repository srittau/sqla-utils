name: Test and lint

on: [push]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14", "3.15"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        name: Install uv
        with:
            python-version: ${{ matrix.python-version }}
      - name: Install Python packages
        run: uv sync --locked
      - name: Lint with ruff
        run: |
          uv run ruff --version
          uv run ruff check sqla_utils test_sqla_utils
      - name: Type checking with mypy
        run: |
          uv run mypy --version
          uv run mypy sqla_utils test_sqla_utils
      - name: Test with pytest
        run: uv run pytest
