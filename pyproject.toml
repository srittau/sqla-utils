[project]
name = "sqla-utils"
version = "0.7.1.dev"
description = "Opinionated utilities for working with SQLAlchemy"
readme = "README.md"
keywords = ["sqlalchemy", "orm"]
authors = [{ name = "Sebastian Rittau", email = "srittau@rittau.biz" }]
license = "MIT"
license-files = ["LICENSE"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Topic :: Software Development",
    "Typing :: Typed",
]
requires-python = ">= 3.9"
dependencies = ["SQLAlchemy >= 1.4, < 3"]

[dependency-groups]
dev = [
    "black >= 25.11.0, < 26",
    "flake8 >= 7.0.0, < 8",
    "isort >= 6.1.0, < 7",
    "mypy >= 1.19.1, < 2",
    "pytest",
]

[project.urls]
Homepage = "https://github.com/srittau/sqla-utils"
Repository = "https://github.com/srittau/sqla-utils"

[tool.uv]
exclude-newer = "5 days"

[tool.uv.build-backend]
module-root = ""
source-include = ["CHANGELOG.md"]

[tool.black]
target-version = ["py38"]
line-length = 79

[tool.isort]
profile = "black"
combine_as_imports = true

[tool.pytest.ini_options]
filterwarnings = ["error"]

[tool.mypy]
disallow_any_generics = true
disallow_incomplete_defs = true
disallow_untyped_defs = true
disallow_subclassing_any = true
disallow_untyped_calls = true
disallow_untyped_decorators = true
no_implicit_optional = true
no_implicit_reexport = true
warn_redundant_casts = true
warn_return_any = true
warn_unused_configs = true
warn_unused_ignores = true

[build-system]
requires = ["uv_build>=0.11.15,<0.12"]
build-backend = "uv_build"
